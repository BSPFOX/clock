<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手表专用时钟</title>
    <!-- 兼容本地&线上双模式，优先相对路径兜底绝对路径 -->
    <link rel="stylesheet" href="./style.css" onerror="this.href='https://edgzmjkk.dpdns.org/style.css'">
</head>
<body>
<div class="container">
    <div class="control-panel">
        <button id="mode12">12/24时制</button>
        <button id="themeBtn">切换明暗</button>
        <button id="sizeBtn">字体缩放</button>
        <button id="timerBtn">计时器</button>
    </div>

    <div class="clock-canvas-box">
        <canvas id="clockCanvas" width="240" height="240"></canvas>
    </div>

    <div class="digital-clock">
        <div id="timeShow" class="time">00:00:00</div>
        <div id="ampm" class="ampm"></div>
    </div>

    <div class="info-panel">
        <div id="dateShow"></div>
        <div id="lunarShow"></div>
        <div id="zoneShow"></div>
        <div id="batteryShow">电量：100%</div>
    </div>

    <div class="timer-modal" id="timerModal">
        <div class="timer-box">
            <div id="timerText">00:00</div>
            <div class="timer-btns">
                <button id="startTimer">开始</button>
                <button id="resetTimer">重置</button>
                <button id="closeTimer">关闭</button>
            </div>
        </div>
    </div>
</div>

<script src="./main.js" onerror="this.src='https://edgzmjkk.dpdns.org/main.js'"></script>
</body>
</html>
